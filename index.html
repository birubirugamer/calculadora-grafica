<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Orçamento - Máxima</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <section class="topo">
      <h1>Calculadora de Orçamento</h1>
      <p>Calcule vários itens de medidas diferentes e veja o valor total.</p>
    </section>

    <section class="preco-produto">
      <label for="precoProduto">Preço por m²</label>

      <div class="campo-preco">
        <span>R$</span>
        <input 
          type="number" 
          id="precoProduto" 
          min="0" 
          step="0.01"
          oninput="calcularTotal()"
        >
      </div>
    </section>

    <section class="area-itens">
      <div class="titulo-itens">
        <h2>Itens do orçamento</h2>

        <button type="button" class="btn-adicionar" onclick="adicionarItem()">
          Adicionar item
        </button>
      </div>

      <div id="itens">

        <div class="item-orcamento">
          <div class="cabecalho-item">
            <h3>Item 1</h3>
            <button type="button" class="btn-remover" onclick="removerItem(this)">
              Remover
            </button>
          </div>

          <div class="campos">
            <div class="campo">
              <label>Largura em metros</label>
              <input 
                type="number" 
                class="largura" 
                min="0" 
                step="0.01" 
                oninput="calcularTotal()"
              >
            </div>

            <div class="campo">
              <label>Altura em metros</label>
              <input 
                type="number" 
                class="altura" 
                min="0" 
                step="0.01" 
                oninput="calcularTotal()"
              >
            </div>

            <div class="campo">
              <label>Quantidade</label>
              <input 
                type="number" 
                class="quantidade" 
                value="1" 
                min="1" 
                step="1" 
                oninput="calcularTotal()"
              >
            </div>
          </div>

          <div class="resultado-item">
            <p>Valor real: <strong class="valor-real-item">R$ 0,00</strong></p>
            <p>Valor final: <strong class="valor-final-item">R$ 0,00</strong></p>
          </div>
        </div>

      </div>
    </section>

    <section class="resultado-final">
      <div>
        <span>Total geral</span>
        <strong id="totalGeral">R$ 0,00</strong>
      </div>

      <div>
        <span>Valor real sem arredondamento</span>
        <strong id="totalReal">R$ 0,00</strong>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
