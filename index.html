<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Orçamento - Máxima</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <section class="topo">
      <h1>Calculadora de Orçamento</h1>
      <p>Adicione vários itens com medidas diferentes e veja o valor final do orçamento.</p>
    </section>

    <section class="preco-produto">
      <label for="precoProduto">Preço do produto por m²</label>
      <div class="campo-preco">
        <span>R$</span>
        <input 
          type="number" 
          id="precoProduto" 
          placeholder="Ex: 80" 
          min="0" 
          step="0.01"
          oninput="calcularTotal()"
        >
      </div>
    </section>

    <section class="area-itens">
      <div class="titulo-itens">
        <h2>Itens do orçamento</h2>
        <button type="button" class="btn-adicionar" onclick="adicionarItem()">
          Adicionar item
        </button>
      </div>

      <div id="itens"></div>
    </section>

    <section class="resultado-final">
      <div>
        <span>Total geral</span>
        <strong id="totalGeral">R$ 0,00</strong>
      </div>

      <div>
        <span>Valor real sem arredondamento</span>
        <strong id="totalReal">R$ 0,00</strong>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
