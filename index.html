<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Orçamento</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <section class="card">
      <div class="topo">
        <h1>Calculadora de Orçamento</h1>
        <p>Calcule produtos por metro quadrado com valor final arredondado.</p>
      </div>

      <div id="lista-itens">
        <div class="item" data-item="1">
          <div class="item-header">
            <h2>Item 1</h2>
          </div>

          <div class="grid">
            <div class="campo">
              <label>Produto</label>
              <select class="produto">
                <option value="80">Banner - R$ 80,00 o m²</option>
                <option value="80">Adesivo de vinil - R$ 80,00 o m²</option>
                <option value="130">MDF 3mm adesivado - R$ 130,00 o m²</option>
                <option value="190">MDF 6mm adesivado - R$ 190,00 o m²</option>
                <option value="230">PVC adesivado - R$ 230,00 o m²</option>
              </select>
            </div>

            <div class="campo">
              <label>Largura em cm</label>
              <input type="number" class="largura" min="0" step="0.01" placeholder="Largura" />
            </div>

            <div class="campo">
              <label>Altura em cm</label>
              <input type="number" class="altura" min="0" step="0.01" placeholder="Altura" />
            </div>

            <div class="campo">
              <label>Quantidade</label>
              <input type="number" class="quantidade" min="1" step="1" value="1" />
            </div>
          </div>

          <button class="btn-remover" type="button">Remover item</button>
        </div>
      </div>

      <div class="botoes">
        <button id="adicionar-item" type="button">+ Adicionar item</button>
        <button id="calcular" type="button">Calcular orçamento</button>
      </div>

      <section class="resultado">
        <div>
          <span>Valor final</span>
          <strong id="valor-final">R$ 0,00</strong>
        </div>

        <div>
          <span>Valor real</span>
          <strong id="valor-real">R$ 0,00</strong>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
