<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Orçamento - Máxima</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Calculadora de Orçamento</h1>

    <label>Largura em metros:</label>
    <input type="number" id="largura" placeholder="Ex: 1.50">

    <label>Altura em metros:</label>
    <input type="number" id="altura" placeholder="Ex: 1.00">

    <label>Preço por m²:</label>
    <input type="number" id="preco" placeholder="Ex: 80">

    <label>Quantidade:</label>
    <input type="number" id="quantidade" placeholder="Ex: 1" value="1">

    <button onclick="calcular()">Calcular</button>

    <h2 id="resultado">Resultado: R$ 0,00</h2>
    <p id="resultadoReal">Valor real: R$ 0,00</p>
  </div>


  <script src="script.js"></script>
</body>
</html>
